---
- name: Tailscale (host)
  when: tailscale_host_enabled | bool
  block:
    - name: Assert Tailscale auth key is defined
      ansible.builtin.assert:
        that:
          - tailscale_auth_key | length > 0
        fail_msg: >-
          Set vault_tailscale_auth_key in inventory/group_vars/all/vault.yaml
          (ansible-vault edit inventory/group_vars/all/vault.yaml).

    - name: Install Tailscale
      ansible.builtin.shell: |
        set -euo pipefail
        curl -fsSL https://tailscale.com/install.sh | sh
      args:
        creates: /usr/bin/tailscale
        executable: /bin/bash

    - name: Enable and start tailscaled
      ansible.builtin.systemd:
        name: tailscaled
        enabled: true
        state: started
        daemon_reload: true

    - name: Build tailscale up argv
      ansible.builtin.set_fact:
        tailscale_up_argv: >-
          {{
            ['tailscale', 'up', '--authkey=' + tailscale_auth_key]
            + (['--hostname=' + tailscale_hostname] if tailscale_hostname | length > 0 else ['--hostname=' + inventory_hostname])
            + (['--ssh'] if tailscale_ssh | bool else [])
            + (['--advertise-routes=' + (tailscale_advertise_routes | join(','))] if tailscale_advertise_routes | length > 0 else [])
            + (['--advertise-exit-node'] if tailscale_advertise_exit_node | bool else [])
            + (['--accept-routes'] if tailscale_accept_routes | bool else [])
            + (tailscale_extra_up_args.split() if tailscale_extra_up_args | length > 0 else [])
          }}

    - name: Join tailnet
      ansible.builtin.command:
        argv: "{{ tailscale_up_argv }}"
      register: tailscale_up
      changed_when: tailscale_up.rc == 0 and 'Success' in tailscale_up.stdout

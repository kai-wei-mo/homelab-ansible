- name: Install k3s
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | sh -s - \
      --write-kubeconfig-mode 644
  args:
    creates: /usr/local/bin/k3s

- name: Ensure k3s service is enabled and running
  ansible.builtin.service:
    name: k3s
    enabled: yes
    state: started

- name: Wait for k3s node to be ready
  ansible.builtin.shell: k3s kubectl get nodes
  register: k3s_nodes
  retries: 10
  delay: 6
  until: k3s_nodes.rc == 0

- set_fact:
    k3s_config_dir: "{{ ansible_facts['env']['HOME'] }}/.kube"

- debug:
    var: k3s_config_dir

- name: Ensure kubeconfig directory exists
  ansible.builtin.file:
    path: "{{ k3s_config_dir }}"
    state: directory
    mode: "0700"

- name: Render k3s config from template
  ansible.builtin.template:
    src: templates/k3s.config.yaml.j2
    dest: "{{ k3s_config_dir }}/k3s.config.yaml"
    owner: "{{ ansible_user }}"
    mode: "0600"

- name: Set k3s rancher kubeconfig fact
  ansible.builtin.set_fact:
    k3s_kubeconfig: /etc/rancher/k3s/k3s.yaml

- debug:
    msg: "k3s kubeconfig lives at {{ k3s_kubeconfig }}"

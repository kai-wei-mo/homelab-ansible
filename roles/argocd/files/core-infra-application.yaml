apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-ansible
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/kai-wei-mo/homelab-core-infra.git
    targetRevision: main
    path: argocd
    directory:
      recurse: false
      include: application.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# Install Prometheus Node Exporter

- name: Desired node_exporter version
  set_fact:
    node_exporter_version: "1.10.2"

- name: Check installed node_exporter version
  command: node_exporter --version
  register: node_exporter_installed
  failed_when: false
  changed_when: false

- name: Parse installed node_exporter version
  set_fact:
    node_exporter_installed_version: >-
      {{
        (node_exporter_installed.stdout | regex_findall('version ([0-9.]+)'))[0]
        if (node_exporter_installed.stdout is search('version'))
        else ''
      }}

- name: Download node_exporter (pinned)
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-{{ normalized_arch }}.tar.gz"
    dest: /tmp/node_exporter.tar.gz
    mode: "0644"
  when: node_exporter_installed_version != node_exporter_version

- name: Extract node_exporter
  unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp
    remote_src: true
  when: node_exporter_installed_version != node_exporter_version

- name: Install node_exporter binary
  copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ normalized_arch }}/node_exporter"
    dest: /usr/local/bin/node_exporter
    mode: "0755"
    remote_src: true
  become: true
  notify: Restart node_exporter
  when: node_exporter_installed_version != node_exporter_version

- name: Install node_exporter systemd service
  copy:
    src: node_exporter.service
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
  become: true
  notify: Restart node_exporter

- name: Enable node_exporter
  systemd:
    name: node_exporter
    enabled: true
    state: started
    daemon_reload: true
  become: true

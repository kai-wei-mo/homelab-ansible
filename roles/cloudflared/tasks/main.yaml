---
- name: Assert Cloudflare secrets are defined
  ansible.builtin.assert:
    that:
      - cloudflared_origin_cert | length > 0
      - cloudflare_api_token | length > 0
    fail_msg: >-
      Set vault_cloudflared_origin_cert and vault_cloudflare_api_token in
      inventory/group_vars/all/vault.yaml
      (ansible-vault edit inventory/group_vars/all/vault.yaml).
      Origin cert: run `cloudflared tunnel login` once on any machine, then copy
      ~/.cloudflared/cert.pem into the vault.

- name: Install cloudflared
  get_url:
    url: https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
    dest: /tmp/cloudflared.deb

- name: Install package
  apt:
    deb: /tmp/cloudflared.deb

- name: Ensure config directory exists
  file:
    path: "{{ cloudflared_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Cloudflare origin certificate
  copy:
    dest: "{{ cloudflared_origin_cert_path }}"
    content: "{{ cloudflared_origin_cert }}"
    owner: root
    group: root
    mode: "0600"

- name: Set cloudflared CLI environment
  set_fact:
    cloudflared_env:
      TUNNEL_ORIGIN_CERT: "{{ cloudflared_origin_cert_path }}"
      CLOUDFLARE_API_TOKEN: "{{ cloudflare_api_token }}"

- name: Check for existing tunnel credentials
  stat:
    path: "{{ cloudflared_dir }}/credentials.json"
  register: cloudflared_credentials

- name: Create tunnel
  command: cloudflared tunnel create {{ tunnel_name }}
  environment: "{{ cloudflared_env }}"
  register: tunnel_create
  changed_when: "'Created tunnel' in tunnel_create.stdout"
  failed_when:
    - tunnel_create.rc != 0
    - "'already exists' not in tunnel_create.stderr"
  when: not cloudflared_credentials.stat.exists

- name: Get tunnel ID
  command: cloudflared tunnel list
  environment: "{{ cloudflared_env }}"
  register: tunnel_list

- name: Extract tunnel ID
  set_fact:
    tunnel_id: "{{ tunnel_list.stdout_lines | select('search', tunnel_name) | list | first | regex_search('([a-f0-9-]{36})') }}"

- name: Move credentials file
  copy:
    src: "{{ cloudflared_dir }}/{{ tunnel_id }}.json"
    dest: "{{ cloudflared_dir }}/credentials.json"
    remote_src: true
    owner: root
    group: root
    mode: "0600"
  when: not cloudflared_credentials.stat.exists

- name: Create DNS route
  command: cloudflared tunnel route dns {{ tunnel_name }} {{ domain }}
  environment: "{{ cloudflared_env }}"
  register: dns_route
  changed_when: dns_route.rc == 0
  failed_when:
    - dns_route.rc != 0
    - "'already exists' not in dns_route.stderr"

- name: Create config.yml
  copy:
    dest: "{{ cloudflared_dir }}/config.yml"
    content: |
      tunnel: {{ tunnel_name }}
      credentials-file: {{ cloudflared_dir }}/credentials.json

      ingress:
        - hostname: {{ domain }}
          service: http://localhost:80
        - service: http_status:404
    owner: root
    group: root
    mode: "0644"

- name: Install systemd service
  command: cloudflared service install
  args:
    creates: /etc/systemd/system/cloudflared.service

- name: Enable and start cloudflared
  systemd:
    name: cloudflared
    enabled: true
    state: started

---
tunnel_name: homelab
cloudflared_dir: /etc/cloudflared
domain: plex.chaewon.io
cloudflared_origin_cert_path: /etc/cloudflared/cert.pem

# Origin cert (cert.pem) from `cloudflared tunnel login`; real value from vault.
cloudflared_origin_cert: ""

# Cloudflare API token; real value comes from the vault via inventory group_vars.
cloudflare_api_token: ""

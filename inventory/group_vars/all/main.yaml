---
# Vars that apply to every host. Secrets are referenced from vault.yaml
# (ansible-vault encrypted); edit it with: ansible-vault edit inventory/group_vars/all/vault.yaml

# --- SSH connection ---
ansible_user: ansible
ansible_ssh_private_key_file: ~/.ssh/ansible_key

# --- Tailscale: every host joins the tailnet ---
tailscale_host_enabled: true
tailscale_auth_key: "{{ vault_tailscale_auth_key }}"
tailscale_ssh: true
# Every host offers itself as an exit node (approve each in the admin console;
# clients only route through one when they explicitly select it).
tailscale_advertise_exit_node: true
# Per-host settings (e.g. tailscale_advertise_routes) belong in
# inventory/host_vars/<hostname>.yaml
